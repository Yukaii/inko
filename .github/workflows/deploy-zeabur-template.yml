name: Deploy Zeabur Template

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Login Zeabur CLI
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
        run: npx -y zeabur@latest auth login --token "$ZEABUR_TOKEN" -i=false

      - name: Deploy template
        env:
          ZEABUR_PROJECT_ID: ${{ secrets.ZEABUR_PROJECT_ID }}
          ZEABUR_API_DOMAIN: ${{ secrets.ZEABUR_API_DOMAIN }}
          ZEABUR_FRONTEND_DOMAIN: ${{ secrets.ZEABUR_FRONTEND_DOMAIN }}
          ZEABUR_GARAGE_DOMAIN: ${{ secrets.ZEABUR_GARAGE_DOMAIN }}
          ZEABUR_GARAGE_RPC_SECRET: ${{ secrets.ZEABUR_GARAGE_RPC_SECRET }}
          ZEABUR_GARAGE_ADMIN_TOKEN: ${{ secrets.ZEABUR_GARAGE_ADMIN_TOKEN }}
          ZEABUR_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.ZEABUR_OBJECT_STORAGE_ACCESS_KEY_ID }}
          ZEABUR_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.ZEABUR_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          ZEABUR_OBJECT_STORAGE_BUCKET: ${{ secrets.ZEABUR_OBJECT_STORAGE_BUCKET }}
        run: |
          npx -y zeabur@latest template deploy \
            -i=false \
            --file zeabur.yml \
            --project-id "$ZEABUR_PROJECT_ID" \
            --skip-validation \
            --var API_DOMAIN="$ZEABUR_API_DOMAIN" \
            --var FRONTEND_DOMAIN="$ZEABUR_FRONTEND_DOMAIN" \
            --var GARAGE_DOMAIN="$ZEABUR_GARAGE_DOMAIN" \
            --var GARAGE_RPC_SECRET="$ZEABUR_GARAGE_RPC_SECRET" \
            --var GARAGE_ADMIN_TOKEN="$ZEABUR_GARAGE_ADMIN_TOKEN" \
            --var OBJECT_STORAGE_ACCESS_KEY_ID="$ZEABUR_OBJECT_STORAGE_ACCESS_KEY_ID" \
            --var OBJECT_STORAGE_SECRET_ACCESS_KEY="$ZEABUR_OBJECT_STORAGE_SECRET_ACCESS_KEY" \
            --var OBJECT_STORAGE_BUCKET="$ZEABUR_OBJECT_STORAGE_BUCKET"
