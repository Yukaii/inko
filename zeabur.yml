apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Inko
spec:
  description: Inko web app with API and PostgreSQL on Zeabur (R2 object storage)
  variables:
    - key: API_DOMAIN
      type: DOMAIN
      name: API Domain
      description: Subdomain for API service (resulting in <value>.zeabur.app)
    - key: FRONTEND_DOMAIN
      type: DOMAIN
      name: Frontend Domain
      description: Subdomain for frontend service (resulting in <value>.zeabur.app)
    - key: OBJECT_STORAGE_ENDPOINT
      type: STRING
      name: R2 S3 Endpoint
      description: Cloudflare R2 S3 endpoint (for example https://<accountid>.r2.cloudflarestorage.com)
    - key: OBJECT_STORAGE_ACCESS_KEY_ID
      type: STRING
      name: R2 Access Key ID
      description: Cloudflare R2 API token Access Key ID
    - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
      type: PASSWORD
      name: R2 Secret Access Key
      description: Cloudflare R2 API token Secret Access Key
    - key: OBJECT_STORAGE_BUCKET
      type: STRING
      name: R2 Bucket
      description: Bucket used by the application
  services:
    - name: API
      template: GIT
      dependencies:
        - PostgreSQL
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 4000
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "api"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          PORT:
            default: "4000"
          DATABASE_URL:
            default: "${POSTGRES_CONNECTION_STRING}"
          DATABASE_POOL_MAX:
            default: "10"
          API_PUBLIC_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          JWT_SECRET:
            default: "replace-with-strong-secret-at-least-16-chars"
          FRONTEND_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
          OBJECT_STORAGE_ENDPOINT:
            default: "${OBJECT_STORAGE_ENDPOINT}"
          OBJECT_STORAGE_REGION:
            default: "auto"
          OBJECT_STORAGE_BUCKET:
            default: "${OBJECT_STORAGE_BUCKET}"
          OBJECT_STORAGE_ACCESS_KEY_ID:
            default: "${OBJECT_STORAGE_ACCESS_KEY_ID}"
          OBJECT_STORAGE_SECRET_ACCESS_KEY:
            default: "${OBJECT_STORAGE_SECRET_ACCESS_KEY}"
          OBJECT_STORAGE_FORCE_PATH_STYLE:
            default: "false"
          MAIL_PROVIDER:
            default: "log"
          MAIL_FROM:
            default: "Inkō <no-reply@localhost>"
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /health
      domainKey: API_DOMAIN

    - name: PostgreSQL
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:16-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_CONNECTION_STRING:
            default: "postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}"
            expose: true
          POSTGRES_DATABASE:
            default: "${POSTGRES_DB}"
            expose: true
          POSTGRES_DB:
            default: "inko"
          POSTGRES_HOST:
            default: "${CONTAINER_HOSTNAME}"
            expose: true
          POSTGRES_PASSWORD:
            default: "${PASSWORD}"
            expose: true
          POSTGRES_PORT:
            default: "${DATABASE_PORT}"
            expose: true
          POSTGRES_URI:
            default: "${POSTGRES_CONNECTION_STRING}"
            expose: true
          POSTGRES_USER:
            default: "root"
          POSTGRES_USERNAME:
            default: "${POSTGRES_USER}"
            expose: true

    - name: Frontend
      template: GIT
      dependencies:
        - API
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "frontend"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          VITE_API_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          VITE_SITE_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
      domainKey: FRONTEND_DOMAIN
