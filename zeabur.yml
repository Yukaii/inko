apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Inko
spec:
  description: Inko API + self-hosted Convex stack on Zeabur
  variables:
    - key: BACKEND_DOMAIN
      type: DOMAIN
      name: Convex Backend Domain
      description: Subdomain for Convex backend (resulting in <value>.zeabur.app)
    - key: SYNC_DOMAIN
      type: DOMAIN
      name: Convex Site/Auth Domain
      description: Subdomain for Convex site/auth HTTP origin on port 3211 (resulting in <value>.zeabur.app)
    - key: API_DOMAIN
      type: DOMAIN
      name: API Domain
      description: Subdomain for API service (resulting in <value>.zeabur.app)
    - key: FRONTEND_DOMAIN
      type: DOMAIN
      name: Frontend Domain
      description: Subdomain for frontend service (resulting in <value>.zeabur.app)
    - key: CONVEX_INSTANCE_SECRET
      type: PASSWORD
      name: Convex Instance Secret
      description: "64-char hex secret for Convex backend (generate with: openssl rand -hex 32)"
  services:
    - name: API
      template: GIT
      dependencies:
        - Convex Backend
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 4000
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "api"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          PORT:
            default: "4000"
          CONVEX_URL:
            default: "https://${BACKEND_DOMAIN}.zeabur.app"
          CONVEX_SITE_URL:
            default: "https://${SYNC_DOMAIN}.zeabur.app"
          JWT_SECRET:
            default: "replace-with-strong-secret-at-least-16-chars"
          FRONTEND_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /health
      domainKey: API_DOMAIN

    - name: Convex Backend
      template: PREBUILT_V2
      spec:
        source:
          image: ghcr.io/get-convex/convex-backend:latest
        ports:
          - id: convex-http
            port: 3210
            type: HTTP
          - id: convex-sync
            port: 3211
            type: HTTP
        volumes:
          - id: data
            dir: /convex/data
        env:
          INSTANCE_NAME:
            default: "inko-prod"
          INSTANCE_SECRET:
            default: "${CONVEX_INSTANCE_SECRET}"
          CONVEX_CLOUD_ORIGIN:
            default: "https://${BACKEND_DOMAIN}.zeabur.app"
          CONVEX_SITE_ORIGIN:
            default: "https://${SYNC_DOMAIN}.zeabur.app"
          CONVEX_SITE_URL:
            default: "https://${SYNC_DOMAIN}.zeabur.app"
          CUSTOM_AUTH_SITE_URL:
            default: "https://${SYNC_DOMAIN}.zeabur.app"
      domainKey: BACKEND_DOMAIN

    - name: Convex Dashboard
      template: PREBUILT_V2
      dependencies:
        - Convex Backend
      spec:
        source:
          image: ghcr.io/get-convex/convex-dashboard:latest
        ports:
          - id: web
            port: 6791
            type: HTTP
        env:
          NEXT_PUBLIC_DEPLOYMENT_URL:
            default: "https://${BACKEND_DOMAIN}.zeabur.app"

    - name: Frontend
      template: GIT
      dependencies:
        - API
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "frontend"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          VITE_API_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          VITE_CONVEX_URL:
            default: "https://${BACKEND_DOMAIN}.zeabur.app"
      domainKey: FRONTEND_DOMAIN
