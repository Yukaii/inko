apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Inko
spec:
  description: Inko web app with API and PostgreSQL on Zeabur
  variables:
    - key: API_DOMAIN
      type: DOMAIN
      name: API Domain
      description: Subdomain for API service (resulting in <value>.zeabur.app)
    - key: FRONTEND_DOMAIN
      type: DOMAIN
      name: Frontend Domain
      description: Subdomain for frontend service (resulting in <value>.zeabur.app)
    - key: GARAGE_DOMAIN
      type: DOMAIN
      name: Garage Domain
      description: Subdomain for Garage S3 API (resulting in <value>.zeabur.app)
    - key: GARAGE_RPC_SECRET
      type: PASSWORD
      name: Garage RPC Secret
      description: Shared RPC secret for the Garage node
    - key: GARAGE_ADMIN_TOKEN
      type: PASSWORD
      name: Garage Admin Token
      description: Admin token used to manage Garage bucket and keys
    - key: OBJECT_STORAGE_ACCESS_KEY_ID
      type: STRING
      name: Garage S3 Access Key ID
      description: Application S3 access key created in Garage
    - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
      type: PASSWORD
      name: Garage S3 Secret Access Key
      description: Application S3 secret created in Garage
    - key: OBJECT_STORAGE_BUCKET
      type: STRING
      name: Garage Bucket
      description: Bucket used by the application
  services:
    - name: API
      template: GIT
      dependencies:
        - PostgreSQL
        - Garage
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 4000
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "api"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          PORT:
            default: "4000"
          DATABASE_URL:
            default: "${POSTGRES_CONNECTION_STRING}"
          DATABASE_POOL_MAX:
            default: "10"
          API_PUBLIC_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          JWT_SECRET:
            default: "replace-with-strong-secret-at-least-16-chars"
          FRONTEND_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
          OBJECT_STORAGE_ENDPOINT:
            default: "https://${GARAGE_DOMAIN}.zeabur.app"
          OBJECT_STORAGE_REGION:
            default: "garage"
          OBJECT_STORAGE_BUCKET:
            default: "${OBJECT_STORAGE_BUCKET}"
          OBJECT_STORAGE_ACCESS_KEY_ID:
            default: "${OBJECT_STORAGE_ACCESS_KEY_ID}"
          OBJECT_STORAGE_SECRET_ACCESS_KEY:
            default: "${OBJECT_STORAGE_SECRET_ACCESS_KEY}"
          OBJECT_STORAGE_FORCE_PATH_STYLE:
            default: "true"
          MAIL_PROVIDER:
            default: "log"
          MAIL_FROM:
            default: "Inkō <no-reply@localhost>"
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /health
      domainKey: API_DOMAIN

    - name: PostgreSQL
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:16-alpine
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: "inko"
          POSTGRES_USER:
            default: "postgres"
          POSTGRES_PASSWORD:
            default: "postgres"

    - name: Garage
      template: GIT
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: s3
            port: 3900
            type: HTTP
        volumes:
          - id: garage-meta
            dir: /var/lib/garage/meta
          - id: garage-data
            dir: /var/lib/garage/data
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "garage"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          GARAGE_RPC_SECRET:
            default: "${GARAGE_RPC_SECRET}"
          GARAGE_ADMIN_TOKEN:
            default: "${GARAGE_ADMIN_TOKEN}"
          GARAGE_RPC_PUBLIC_ADDR:
            default: "127.0.0.1:3901"
          GARAGE_REGION:
            default: "garage"
          GARAGE_AUTO_BOOTSTRAP:
            default: "true"
          GARAGE_BOOTSTRAP_ZONE:
            default: "garage"
          GARAGE_BOOTSTRAP_CAPACITY:
            default: "10GB"
          OBJECT_STORAGE_BUCKET:
            default: "${OBJECT_STORAGE_BUCKET}"
          OBJECT_STORAGE_ACCESS_KEY_ID:
            default: "${OBJECT_STORAGE_ACCESS_KEY_ID}"
          OBJECT_STORAGE_SECRET_ACCESS_KEY:
            default: "${OBJECT_STORAGE_SECRET_ACCESS_KEY}"
      domainKey: GARAGE_DOMAIN

    - name: Frontend
      template: GIT
      dependencies:
        - API
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "frontend"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          VITE_API_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          VITE_SITE_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
      domainKey: FRONTEND_DOMAIN
