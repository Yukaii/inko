apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Inko
spec:
  description: Inko web app with API and PostgreSQL on Zeabur
  variables:
    - key: API_DOMAIN
      type: DOMAIN
      name: API Domain
      description: Subdomain for API service (resulting in <value>.zeabur.app)
    - key: FRONTEND_DOMAIN
      type: DOMAIN
      name: Frontend Domain
      description: Subdomain for frontend service (resulting in <value>.zeabur.app)
  services:
    - name: API
      template: GIT
      dependencies:
        - PostgreSQL
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 4000
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "api"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          PORT:
            default: "4000"
          DATABASE_URL:
            default: "${POSTGRES_CONNECTION_STRING}"
          DATABASE_POOL_MAX:
            default: "10"
          JWT_SECRET:
            default: "replace-with-strong-secret-at-least-16-chars"
          FRONTEND_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
          MAIL_PROVIDER:
            default: "log"
          MAIL_FROM:
            default: "Inkō <no-reply@localhost>"
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /health
      domainKey: API_DOMAIN

    - name: PostgreSQL
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:16-alpine
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: "inko"
          POSTGRES_USER:
            default: "postgres"
          POSTGRES_PASSWORD:
            default: "postgres"

    - name: Frontend
      template: GIT
      dependencies:
        - API
      spec:
        source:
          source: GITHUB
          repo: 1167879584
          branch: main
          rootDirectory: .
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          ZBPACK_DOCKERFILE_NAME:
            default: "frontend"
          ZBPACK_IGNORE_DOCKERFILE:
            default: "false"
          VITE_API_URL:
            default: "https://${API_DOMAIN}.zeabur.app"
          VITE_SITE_URL:
            default: "https://${FRONTEND_DOMAIN}.zeabur.app"
      domainKey: FRONTEND_DOMAIN
