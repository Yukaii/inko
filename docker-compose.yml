services:
  postgres:
    image: postgres:16-alpine
    container_name: inko-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inko
    ports:
      - "5432:5432"
    volumes:
      - inko-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inko"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inko-postgres-data:
