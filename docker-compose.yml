services:
  garage:
    build:
      context: .
      dockerfile: Dockerfile.garage
    container_name: inko-garage
    ports:
      - "3900:3900"
      - "3903:3903"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_RPC_PUBLIC_ADDR: ${GARAGE_RPC_PUBLIC_ADDR:-garage:3901}
      GARAGE_REGION: ${GARAGE_REGION:-garage}
      GARAGE_AUTO_BOOTSTRAP: ${GARAGE_AUTO_BOOTSTRAP:-true}
      GARAGE_BOOTSTRAP_ZONE: ${GARAGE_BOOTSTRAP_ZONE:-local}
      GARAGE_BOOTSTRAP_CAPACITY: ${GARAGE_BOOTSTRAP_CAPACITY:-10GB}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - inko-garage-meta:/var/lib/garage/meta
      - inko-garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inko-garage-meta:
  inko-garage-data:
